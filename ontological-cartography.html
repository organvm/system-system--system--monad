<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ontological Cartography</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 22px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 13px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section { margin-bottom: 28px; }

        .control-section h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '\2022';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .control-group { margin-bottom: 16px; }

        .control-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 6px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 48px;
            text-align: right;
        }

        .color-group { margin-bottom: 14px; }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active { transform: translateY(0); }

        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button { flex: 1; }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
            padding: 100px;
        }

        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Ontological Cartography</h1>
            <div class="subtitle">Diagrammatics of V(&#928;) &mdash; hierarchy, nesting, flow of plane-existence variables</div>

            <!-- Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">&larr; Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next &rarr;</button>
                </div>
                <button class="button tertiary" onclick="randomSeedAndUpdate()" style="margin-bottom:0">&#8635; Random</button>
            </div>

            <!-- Parameters Section -->
            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Force Strength</label>
                    <div class="slider-container">
                        <input type="range" id="forceStrength" min="0.1" max="3.0" step="0.1" value="1.0" oninput="updateParam('forceStrength', this.value)">
                        <span class="value-display" id="forceStrength-value">1.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Flow Speed</label>
                    <div class="slider-container">
                        <input type="range" id="flowSpeed" min="0.2" max="3.0" step="0.1" value="1.0" oninput="updateParam('flowSpeed', this.value)">
                        <span class="value-display" id="flowSpeed-value">1.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Breath Amplitude</label>
                    <div class="slider-container">
                        <input type="range" id="breathAmplitude" min="0" max="20" step="1" value="8" oninput="updateParam('breathAmplitude', this.value)">
                        <span class="value-display" id="breathAmplitude-value">8</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Node Scale</label>
                    <div class="slider-container">
                        <input type="range" id="nodeScale" min="0.5" max="2.0" step="0.05" value="1.0" oninput="updateParam('nodeScale', this.value)">
                        <span class="value-display" id="nodeScale-value">1.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Primitive Visibility</label>
                    <div class="slider-container">
                        <input type="range" id="primitiveVisibility" min="0" max="100" step="5" value="70" oninput="updateParam('primitiveVisibility', this.value)">
                        <span class="value-display" id="primitiveVisibility-value">70%</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Drift</label>
                    <div class="slider-container">
                        <input type="range" id="drift" min="0" max="2.0" step="0.1" value="0.3" oninput="updateParam('drift', this.value)">
                        <span class="value-display" id="drift-value">0.3</span>
                    </div>
                </div>
            </div>

            <!-- Colors Section -->
            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Container (D, B, K)</label>
                    <div class="color-picker-container">
                        <input type="color" id="containerColor" value="#4a6fa5" onchange="updateColor('containerColor', this.value)">
                        <span class="color-value" id="containerColor-value">#4a6fa5</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Module (&Gamma;, &Tau;, &Phi;, &Iota;)</label>
                    <div class="color-picker-container">
                        <input type="color" id="moduleColor" value="#d97757" onchange="updateColor('moduleColor', this.value)">
                        <span class="color-value" id="moduleColor-value">#d97757</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Emergent (&Sigma;)</label>
                    <div class="color-picker-container">
                        <input type="color" id="emergentColor" value="#788c5d" onchange="updateColor('emergentColor', this.value)">
                        <span class="color-value" id="emergentColor-value">#788c5d</span>
                    </div>
                </div>
            </div>

            <!-- Actions Section -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row" style="margin-bottom:8px">
                    <button class="button" onclick="resetParameters()">Reset</button>
                    <button class="button secondary" onclick="downloadPNG()">Download</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing ontological map...</div>
            </div>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════════════════════
    // ONTOLOGICAL DATA MODEL — FIXED TOPOLOGY
    // ═══════════════════════════════════════════════════════════════

    const NODE_DEFS = [
        { id: 'D', label: 'D',  name: 'Dimensionality',    type: 'container', prims: ['d_spatial', 'd_compact'] },
        { id: 'B', label: '\u0392', name: 'Boundary',       type: 'container', prims: ['topology', 'extent', 'openness'] },
        { id: 'K', label: '\u039A', name: 'Info Capacity',  type: 'container', prims: ['S_max'], derived: true },
        { id: 'G', label: '\u0393', name: 'Force Geometry', type: 'module',    prims: ['coupling', 'range', 'mediator'] },
        { id: 'T', label: '\u03A4', name: 'Temporality',    type: 'module',    prims: ['direction', 'rate', 'reversibility'] },
        { id: 'P', label: '\u03A6', name: 'Energy Regime',  type: 'module',    prims: ['quantity', 'distribution', 'gradient'] },
        { id: 'I', label: '\u0399', name: 'Interaction Rules', type: 'module', prims: ['rule', 'symmetry', 'conservation'] },
        { id: 'S', label: '\u03A3', name: 'Phase Spectrum',  type: 'emergent', prims: [] },
    ];

    const EDGE_DEFS = [
        { from: 'D', to: 'G', rel: 'constrains',  curveOff: 30 },
        { from: 'D', to: 'K', rel: 'constrains',  curveOff: -25 },
        { from: 'D', to: 'B', rel: 'constrains',  curveOff: 20 },
        { from: 'G', to: 'S', rel: 'determines',  curveOff: 28 },
        { from: 'P', to: 'S', rel: 'determines',  curveOff: -28 },
        { from: 'T', to: 'S', rel: 'determines',  curveOff: 22 },
        { from: 'I', to: 'S', rel: 'determines',  curveOff: -22 },
        { from: 'P', to: 'K', rel: 'derives',     curveOff: -35 },
    ];

    // ═══════════════════════════════════════════════════════════════
    // PARAMETERS
    // ═══════════════════════════════════════════════════════════════

    let params = {
        seed: 42,
        forceStrength: 1.0,
        flowSpeed: 1.0,
        breathAmplitude: 8,
        nodeScale: 1.0,
        primitiveVisibility: 70,
        drift: 0.3,
        containerColor: '#4a6fa5',
        moduleColor: '#d97757',
        emergentColor: '#788c5d',
    };

    let defaultParams = JSON.parse(JSON.stringify(params));

    // ═══════════════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════════════

    let nodes = [];
    let flowParticles = [];
    let hoveredNode = null;

    // ═══════════════════════════════════════════════════════════════
    // UTILITY
    // ═══════════════════════════════════════════════════════════════

    function hexToRgb(hex) {
        const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return r ? { r: parseInt(r[1],16), g: parseInt(r[2],16), b: parseInt(r[3],16) }
                 : { r: 128, g: 128, b: 128 };
    }

    function getNode(id) {
        return nodes.find(n => n.id === id);
    }

    function typeColor(type) {
        if (type === 'container') return params.containerColor;
        if (type === 'module') return params.moduleColor;
        return params.emergentColor;
    }

    // ═══════════════════════════════════════════════════════════════
    // CLASSES
    // ═══════════════════════════════════════════════════════════════

    class OntNode {
        constructor(def, x, y) {
            this.id = def.id;
            this.label = def.label;
            this.name = def.name;
            this.type = def.type;
            this.prims = def.prims;
            this.derived = def.derived || false;
            this.pos = createVector(x, y);
            this.vel = createVector(0, 0);
            this.acc = createVector(0, 0);
            this.mass = this.type === 'container' ? 3.5 : this.type === 'module' ? 2 : 1.2;
            this.baseRadius = this.type === 'container' ? 72 : this.type === 'module' ? 52 : 42;
            this.breathPhase = random(TWO_PI);
            this.breathFreq = this.type === 'container' ? 0.014 : this.type === 'module' ? 0.028 : 0.048;
            this.orbs = [];
            for (let i = 0; i < this.prims.length; i++) {
                this.orbs.push({
                    angle: (TWO_PI / this.prims.length) * i + random(-0.4, 0.4),
                    speed: random(0.006, 0.016),
                    orbitR: random(0.3, 0.55),
                    size: random(3, 6),
                    name: this.prims[i],
                });
            }
        }

        getRadius() {
            return this.baseRadius * params.nodeScale
                 + params.breathAmplitude * sin(frameCount * this.breathFreq + this.breathPhase);
        }

        applyForce(f) {
            this.acc.add(p5.Vector.div(f, this.mass));
        }

        update() {
            this.vel.add(this.acc);
            this.vel.mult(0.9);
            let d = createVector(
                noise(this.pos.x * 0.001, frameCount * 0.0008) - 0.5,
                noise(this.pos.y * 0.001, frameCount * 0.0008 + 99) - 0.5
            ).mult(params.drift * 0.4);
            this.vel.add(d);
            this.pos.add(this.vel);
            this.acc.mult(0);
            let m = 130;
            this.pos.x = constrain(this.pos.x, m, width - m);
            this.pos.y = constrain(this.pos.y, m, height - m);
            for (let o of this.orbs) o.angle += o.speed;
        }

        display() {
            let r = this.getRadius();
            let c = hexToRgb(typeColor(this.type));
            let isHov = (hoveredNode === this.id);
            let hMul = isHov ? 1.6 : 1.0;

            push();
            translate(this.pos.x, this.pos.y);

            if (this.type === 'container') {
                // Translucent body
                noStroke();
                fill(c.r, c.g, c.b, 25 * hMul);
                ellipse(0, 0, r * 2, r * 2);
                // Dashed border
                stroke(c.r, c.g, c.b, 90 * hMul);
                strokeWeight(2);
                noFill();
                let segs = 28;
                for (let i = 0; i < segs; i++) {
                    let a0 = (TWO_PI / segs) * i;
                    let a1 = a0 + (TWO_PI / segs) * 0.6;
                    arc(0, 0, r * 2, r * 2, a0, a1);
                }
            } else if (this.type === 'module') {
                noStroke();
                fill(c.r, c.g, c.b, 40 * hMul);
                ellipse(0, 0, r * 2, r * 2);
                stroke(c.r, c.g, c.b, 130 * hMul);
                strokeWeight(1.5);
                noFill();
                ellipse(0, 0, r * 2, r * 2);
            } else {
                // Emergent shimmer
                noStroke();
                for (let i = 5; i >= 0; i--) {
                    let sh = sin(frameCount * 0.05 + i * 0.9) * 0.35 + 0.55;
                    fill(c.r, c.g, c.b, sh * 30 * hMul);
                    ellipse(0, 0, r * 2 * (1 + i * 0.14), r * 2 * (1 + i * 0.14));
                }
                fill(c.r, c.g, c.b, 50 * hMul);
                stroke(c.r, c.g, c.b, 110 * hMul);
                strokeWeight(1);
                ellipse(0, 0, r * 2, r * 2);
            }

            // Inner primitive orbs
            if (this.orbs.length > 0) {
                let pa = (params.primitiveVisibility / 100) * 220;
                for (let o of this.orbs) {
                    let ox = cos(o.angle) * r * o.orbitR;
                    let oy = sin(o.angle) * r * o.orbitR;
                    noStroke();
                    fill(c.r, c.g, c.b, pa);
                    ellipse(ox, oy, o.size, o.size);
                    // Tiny orbit trace
                    noFill();
                    stroke(c.r, c.g, c.b, pa * 0.2);
                    strokeWeight(0.5);
                    ellipse(0, 0, r * o.orbitR * 2, r * o.orbitR * 2);
                }
            }

            // Greek label
            noStroke();
            fill(20, 20, 19, 210);
            textAlign(CENTER, CENTER);
            textStyle(BOLD);
            textSize(this.type === 'emergent' ? 22 : 26);
            text(this.label, 0, -10);

            // Name
            textStyle(NORMAL);
            textSize(10);
            fill(20, 20, 19, 140);
            text(this.name, 0, 10);

            // Type badge
            textSize(8);
            let badge = this.type.toUpperCase();
            if (this.derived) badge += ' (derived)';
            fill(c.r, c.g, c.b, 160);
            text(badge, 0, 24);

            pop();
        }
    }

    class FlowParticle {
        constructor(edge) {
            this.from = edge.from;
            this.to = edge.to;
            this.curveOff = edge.curveOff + random(-5, 5);
            this.t = 0;
            this.speed = random(0.004, 0.011) * params.flowSpeed;
            this.size = random(2.5, 5);
            this.alive = true;
        }

        update() {
            this.t += this.speed;
            if (this.t >= 1) this.alive = false;
        }

        display() {
            let src = getNode(this.from).pos;
            let tgt = getNode(this.to).pos;
            let mid = p5.Vector.lerp(src, tgt, 0.5);
            let perp = p5.Vector.sub(tgt, src).rotate(HALF_PI).normalize().mult(this.curveOff);
            let ctrl = p5.Vector.add(mid, perp);

            let x = bezierPoint(src.x, ctrl.x, ctrl.x, tgt.x, this.t);
            let y = bezierPoint(src.y, ctrl.y, ctrl.y, tgt.y, this.t);

            let c = hexToRgb(typeColor(getNode(this.from).type));
            let alpha = sin(this.t * PI) * 190;

            noStroke();
            // Glow
            fill(c.r, c.g, c.b, alpha * 0.25);
            ellipse(x, y, this.size * 3, this.size * 3);
            // Core
            fill(c.r, c.g, c.b, alpha);
            ellipse(x, y, this.size, this.size);
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // FORCE SIMULATION
    // ═══════════════════════════════════════════════════════════════

    function applyForces() {
        let fs = params.forceStrength;

        // Coulomb repulsion
        for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
                let f = p5.Vector.sub(nodes[i].pos, nodes[j].pos);
                let d = max(f.mag(), 60);
                f.normalize();
                let str = (fs * 55000) / (d * d);
                nodes[i].applyForce(p5.Vector.mult(f, str));
                nodes[j].applyForce(p5.Vector.mult(f, -str));
            }
        }

        // Hooke attraction along edges
        for (let e of EDGE_DEFS) {
            let s = getNode(e.from);
            let t = getNode(e.to);
            let f = p5.Vector.sub(t.pos, s.pos);
            let d = f.mag();
            let rest = 220;
            f.normalize();
            let str = fs * 0.012 * (d - rest);
            s.applyForce(p5.Vector.mult(f, str));
            t.applyForce(p5.Vector.mult(f, -str));
        }

        // Center gravity
        let center = createVector(width / 2, height / 2);
        for (let n of nodes) {
            let toCtr = p5.Vector.sub(center, n.pos);
            toCtr.mult(0.0006 * fs);
            n.applyForce(toCtr);
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // EDGE + FLOW RENDERING
    // ═══════════════════════════════════════════════════════════════

    function drawEdge(e) {
        let src = getNode(e.from).pos;
        let tgt = getNode(e.to).pos;
        let sc = hexToRgb(typeColor(getNode(e.from).type));
        let tc = hexToRgb(typeColor(getNode(e.to).type));

        let mid = p5.Vector.lerp(src, tgt, 0.5);
        let perp = p5.Vector.sub(tgt, src).rotate(HALF_PI).normalize().mult(e.curveOff);
        let ctrl = p5.Vector.add(mid, perp);

        // Is this edge connected to hovered node?
        let hov = (hoveredNode === e.from || hoveredNode === e.to);
        let aMul = hov ? 2.5 : 1.0;

        // Edge curve
        stroke(
            lerp(sc.r, tc.r, 0.5),
            lerp(sc.g, tc.g, 0.5),
            lerp(sc.b, tc.b, 0.5),
            35 * aMul
        );
        strokeWeight(hov ? 1.8 : 1.1);
        noFill();
        bezier(src.x, src.y, ctrl.x, ctrl.y, ctrl.x, ctrl.y, tgt.x, tgt.y);

        // Arrowhead at t=0.72
        let at = 0.72;
        let ax = bezierPoint(src.x, ctrl.x, ctrl.x, tgt.x, at);
        let ay = bezierPoint(src.y, ctrl.y, ctrl.y, tgt.y, at);
        let atx = bezierTangent(src.x, ctrl.x, ctrl.x, tgt.x, at);
        let aty = bezierTangent(src.y, ctrl.y, ctrl.y, tgt.y, at);
        let ang = atan2(aty, atx);

        push();
        translate(ax, ay);
        rotate(ang);
        noStroke();
        fill(
            lerp(sc.r, tc.r, 0.5),
            lerp(sc.g, tc.g, 0.5),
            lerp(sc.b, tc.b, 0.5),
            55 * aMul
        );
        triangle(0, 0, -8, -3.5, -8, 3.5);
        pop();

        // Relation label near midpoint
        let lt = 0.48;
        let lx = bezierPoint(src.x, ctrl.x, ctrl.x, tgt.x, lt);
        let ly = bezierPoint(src.y, ctrl.y, ctrl.y, tgt.y, lt);
        noStroke();
        fill(120, 118, 110, 80 * aMul);
        textAlign(CENTER, CENTER);
        textSize(8);
        textStyle(ITALIC);
        text(e.rel, lx + e.curveOff * 0.25, ly + e.curveOff * 0.25);
        textStyle(NORMAL);
    }

    function spawnFlowParticles() {
        for (let e of EDGE_DEFS) {
            if (random() < 0.025 * params.flowSpeed) {
                flowParticles.push(new FlowParticle(e));
            }
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // EXISTENCE CONDITION RING
    // ═══════════════════════════════════════════════════════════════

    function drawExistenceRing() {
        let pulse = sin(frameCount * 0.018) * 0.3 + 0.7;
        let cx = width / 2, cy = height / 2;
        let maxR = 0;
        for (let n of nodes) {
            let d = dist(n.pos.x, n.pos.y, cx, cy) + n.getRadius();
            if (d > maxR) maxR = d;
        }

        noFill();
        stroke(200, 160, 40, pulse * 45);
        strokeWeight(1.8);
        ellipse(cx, cy, (maxR + 50) * 2, (maxR + 50) * 2);

        // Second thinner ring
        stroke(200, 160, 40, pulse * 25);
        strokeWeight(0.8);
        ellipse(cx, cy, (maxR + 60) * 2, (maxR + 60) * 2);

        // Condition text
        noStroke();
        fill(180, 150, 40, pulse * 110);
        textAlign(CENTER, CENTER);
        textSize(10);
        textStyle(NORMAL);
        text('\u03A6 > 0  \u2227  |\u03A3| \u2265 2  \u2227  \u03A4.dir \u2260 \u2205  \u2227  \u0399 \u2260 \u2205', cx, cy + maxR + 72);
    }

    // ═══════════════════════════════════════════════════════════════
    // LEGEND
    // ═══════════════════════════════════════════════════════════════

    function drawLegend() {
        let x = 36, y = height - 135;
        push();
        noStroke();
        fill(250, 249, 245, 210);
        rect(x - 12, y - 14, 190, 128, 8);

        textAlign(LEFT, CENTER);
        textSize(9);
        textStyle(NORMAL);

        // Container
        let cc = hexToRgb(params.containerColor);
        noFill();
        stroke(cc.r, cc.g, cc.b, 140);
        strokeWeight(1.5);
        let segs = 10;
        for (let i = 0; i < segs; i++) {
            let a0 = (TWO_PI / segs) * i;
            let a1 = a0 + (TWO_PI / segs) * 0.6;
            arc(x + 10, y + 5, 16, 16, a0, a1);
        }
        noStroke();
        fill(60);
        text('Container (arena)', x + 24, y + 5);

        // Module
        let mc = hexToRgb(params.moduleColor);
        fill(mc.r, mc.g, mc.b, 50);
        stroke(mc.r, mc.g, mc.b, 140);
        strokeWeight(1.5);
        ellipse(x + 10, y + 28, 16, 16);
        noStroke();
        fill(60);
        text('Module (composed)', x + 24, y + 28);

        // Emergent
        let ec = hexToRgb(params.emergentColor);
        fill(ec.r, ec.g, ec.b, 40);
        stroke(ec.r, ec.g, ec.b, 120);
        strokeWeight(1);
        ellipse(x + 10, y + 51, 16, 16);
        noStroke();
        fill(60);
        text('Emergent (derived)', x + 24, y + 51);

        // Dependency arrow
        stroke(120, 118, 110, 70);
        strokeWeight(1.1);
        line(x + 2, y + 74, x + 14, y + 74);
        noStroke();
        fill(120, 118, 110, 100);
        triangle(x + 15, y + 74, x + 11, y + 71, x + 11, y + 77);
        fill(60);
        text('Dependency flow', x + 24, y + 74);

        // Primitive orb
        noStroke();
        fill(120, 118, 110, 180);
        ellipse(x + 10, y + 97, 4, 4);
        noFill();
        stroke(120, 118, 110, 60);
        strokeWeight(0.5);
        ellipse(x + 10, y + 97, 12, 12);
        noStroke();
        fill(60);
        text('Primitive (orbiting)', x + 24, y + 97);

        pop();
    }

    // ═══════════════════════════════════════════════════════════════
    // P5.JS LIFECYCLE
    // ═══════════════════════════════════════════════════════════════

    function setup() {
        let canvas = createCanvas(1200, 1200);
        canvas.parent('canvas-container');
        textFont('Georgia');
        initializeSystem();
        document.querySelector('.loading').style.display = 'none';
    }

    function initializeSystem() {
        randomSeed(params.seed);
        noiseSeed(params.seed);

        nodes = [];
        flowParticles = [];
        hoveredNode = null;

        let cx = width / 2, cy = height / 2;
        let spread = 260;

        for (let i = 0; i < NODE_DEFS.length; i++) {
            let ang = (TWO_PI / NODE_DEFS.length) * i + random(-0.35, 0.35);
            let r = spread + random(-90, 90);
            let x = cx + cos(ang) * r;
            let y = cy + sin(ang) * r;
            nodes.push(new OntNode(NODE_DEFS[i], x, y));
        }

        background(250, 249, 245);
    }

    function draw() {
        background(250, 249, 245);

        // Detect hover
        hoveredNode = null;
        for (let n of nodes) {
            if (dist(mouseX, mouseY, n.pos.x, n.pos.y) < n.getRadius()) {
                hoveredNode = n.id;
            }
        }

        // Physics
        applyForces();
        for (let n of nodes) n.update();

        // Flow particles
        spawnFlowParticles();
        for (let fp of flowParticles) fp.update();
        flowParticles = flowParticles.filter(fp => fp.alive);

        // Render layers: edges → flow → nodes → ring → legend
        for (let e of EDGE_DEFS) drawEdge(e);
        for (let fp of flowParticles) fp.display();
        for (let n of nodes) n.display();

        drawExistenceRing();
        drawLegend();

        // Title cartouche
        noStroke();
        fill(20, 20, 19, 60);
        textAlign(CENTER, CENTER);
        textSize(14);
        textStyle(NORMAL);
        text('V(\u03A0) \u2014 Plane-Existence Variables', width / 2, 35);
    }

    // ═══════════════════════════════════════════════════════════════
    // UI HANDLERS
    // ═══════════════════════════════════════════════════════════════

    function updateParam(name, value) {
        let v = parseFloat(value);
        params[name] = v;
        let display = document.getElementById(name + '-value');
        if (display) {
            display.textContent = name === 'primitiveVisibility' ? v + '%' : v;
        }
    }

    function updateColor(name, value) {
        params[name] = value;
        let display = document.getElementById(name + '-value');
        if (display) display.textContent = value;
    }

    function downloadPNG() {
        saveCanvas('ontological-cartography-' + params.seed, 'png');
    }

    // ═══════════════════════════════════════════════════════════════
    // SEED NAVIGATION
    // ═══════════════════════════════════════════════════════════════

    function updateSeedDisplay() {
        document.getElementById('seed-input').value = params.seed;
    }

    function updateSeed() {
        let v = parseInt(document.getElementById('seed-input').value);
        if (v && v > 0) {
            params.seed = v;
            initializeSystem();
        } else {
            updateSeedDisplay();
        }
    }

    function previousSeed() {
        params.seed = Math.max(1, params.seed - 1);
        updateSeedDisplay();
        initializeSystem();
    }

    function nextSeed() {
        params.seed++;
        updateSeedDisplay();
        initializeSystem();
    }

    function randomSeedAndUpdate() {
        params.seed = Math.floor(Math.random() * 999999) + 1;
        updateSeedDisplay();
        initializeSystem();
    }

    function resetParameters() {
        params = JSON.parse(JSON.stringify(defaultParams));
        document.getElementById('forceStrength').value = params.forceStrength;
        document.getElementById('forceStrength-value').textContent = params.forceStrength;
        document.getElementById('flowSpeed').value = params.flowSpeed;
        document.getElementById('flowSpeed-value').textContent = params.flowSpeed;
        document.getElementById('breathAmplitude').value = params.breathAmplitude;
        document.getElementById('breathAmplitude-value').textContent = params.breathAmplitude;
        document.getElementById('nodeScale').value = params.nodeScale;
        document.getElementById('nodeScale-value').textContent = params.nodeScale;
        document.getElementById('primitiveVisibility').value = params.primitiveVisibility;
        document.getElementById('primitiveVisibility-value').textContent = params.primitiveVisibility + '%';
        document.getElementById('drift').value = params.drift;
        document.getElementById('drift-value').textContent = params.drift;
        document.getElementById('containerColor').value = params.containerColor;
        document.getElementById('containerColor-value').textContent = params.containerColor;
        document.getElementById('moduleColor').value = params.moduleColor;
        document.getElementById('moduleColor-value').textContent = params.moduleColor;
        document.getElementById('emergentColor').value = params.emergentColor;
        document.getElementById('emergentColor-value').textContent = params.emergentColor;
        updateSeedDisplay();
        initializeSystem();
    }

    window.addEventListener('load', function() {
        updateSeedDisplay();
    });
    </script>
</body>
